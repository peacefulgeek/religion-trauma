name: religion-trauma
region: nyc

domains:
  - domain: religiontrauma.com
    type: PRIMARY
  - domain: www.religiontrauma.com
    type: ALIAS

services:
  - name: web
    github:
      repo: peacefulgeek/religion-trauma
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: NODE_ENV=production node scripts/start-with-cron.mjs
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 60
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: SITE_URL
        value: https://religiontrauma.com
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        type: SECRET
