name: the-faith-wound
region: nyc
services:
  - name: web
    github:
      repo: YOUR_GITHUB_USERNAME/the-faith-wound
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile && pnpm build
    run_command: NODE_ENV=production node scripts/start-with-cron.mjs
    http_port: 3000
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 60
      timeout_seconds: 10
      success_threshold: 1
      failure_threshold: 3
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: DATABASE_URL
        value: ${db.DATABASE_URL}
        type: SECRET
      - key: OPENAI_API_KEY
        type: SECRET
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-v4-pro
      - key: GH_PAT
        type: SECRET
      - key: AMAZON_TAG
        value: spankyspinola-20
databases:
  - name: db
    engine: PG
    version: "15"
    size: db-s-dev-database
    num_nodes: 1
